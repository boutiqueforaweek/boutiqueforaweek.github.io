name: HTML Proofer
on:
  push:
    branches: main
jobs:
  checklinks:
    name: HTMLProofer
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Run gulp
        run: |
          npm ci
          npx gulp build
      - name: Run gulp
        run: |
          npm ci
          npx gulp build
      - name: Install html-proofer
        run: gem install html-proofer
      - name: HTMLProofer
        run: htmlproofer ./_site --allow-hash-href --ignore-status-codes 429,999 --ignore-urls '/www.barnesandnobleinc.com/our-stores-communities/summer-reading-program/,/aidinternationalinc.org/,/twitter.com/'
