name: Spell Check
on:
  push:
    branches: main
jobs:
  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Build
        run: |
          npm install
          npm run build
      - uses: rojopolis/spellcheck-github-actions@0.60.0
        name: Check Spelling
