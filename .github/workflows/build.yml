name: Build
on:
  push:
    branches: main
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
  schedule:
    # GENERATED:start schedule
    # sale_start=2026-09-13 — do not edit; run `npm run gen:workflow`
    - cron: "0 7 13 9 *"
    - cron: "0 4 14 9 *"
    - cron: "0 4 15 9 *"
    - cron: "0 4 16 9 *"
    - cron: "0 4 17 9 *"
    - cron: "0 4 18 9 *"
    - cron: "0 21 19 9 *"
    - cron: "0 17 20 9 *"
    # GENERATED:end schedule
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    name: Eleventy build
    runs-on: ubuntu-latest
    outputs:
      spell: ${{ steps.spell.outcome }}
      links: ${{ steps.links.outcome }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Build
        run: |
          npm install
          npm run build
      - name: Spell check
        id: spell
        uses: streetsidesoftware/cspell-action@v8
        continue-on-error: true
        with:
          config: cspell.json
          files: "_site/**/*.html"
          incremental_files_only: false
      - name: Link check
        id: links
        uses: lycheeverse/lychee-action@v2
        continue-on-error: true
        with:
          fail: true
          args: >-
            --no-progress
            --root-dir ${{ github.workspace }}/_site
            --accept '200..=299,429,999'
            --exclude 'barnesandnobleinc\.com|aidinternationalinc\.org|twitter\.com|etsy\.com|nhtsa\.gov|mysalemanager\.net|boutiqueforaweek\.com|cpsc\.gov'
            './_site/**/*.html'
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Purge cache
        uses: nathanvaughn/actions-cloudflare-purge@v4.0.0
        with:
            cf_zone: ${{ secrets.CLOUDFLARE_ZONE }}
            cf_auth: ${{ secrets.CLOUDFLARE_AUTH_KEY }}
            hosts: boutiqueforaweek.com
  # Runs only after the site has shipped, so a red run never blocks a deploy.
  # Failing here is the delivery mechanism: it turns the run red, which is what
  # triggers GitHub's "Run failed" notification email.
  notify:
    name: Report check failures
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: needs.build.outputs.spell == 'failure' || needs.build.outputs.links == 'failure'
    steps:
      - name: Fail the run so GitHub emails the failure
        run: |
          echo "Spell check: ${{ needs.build.outputs.spell }}"
          echo "Link check:  ${{ needs.build.outputs.links }}"
          echo "Site deployed successfully; one or more content checks reported errors."
          echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
