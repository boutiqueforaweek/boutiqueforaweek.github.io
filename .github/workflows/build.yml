name: Build
on:
  push:
    branches: main
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    name: Eleventy build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Build
        run: |
          npm install
          npm run build
      - name: Spell check
        uses: streetsidesoftware/cspell-action@v8
        continue-on-error: true
        with:
          config: cspell.json
          files: "_site/**/*.html"
          incremental_files_only: false
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Purge cache
        uses: nathanvaughn/actions-cloudflare-purge@v4.0.0
        with:
            cf_zone: ${{ secrets.CLOUDFLARE_ZONE }}
            cf_auth: ${{ secrets.CLOUDFLARE_AUTH_KEY }}
            hosts: boutiqueforaweek.com
